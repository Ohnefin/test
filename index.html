<!DOCTYPE html>
<html lang="la">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inveniam</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e0e0e0;
            --accent-color: #444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            cursor: default;
        }

        .content {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 100;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin: 0;
            opacity: 0.8;
            animation: breathe 5s ease-in-out infinite;
            user-select: none;
        }

        .line {
            height: 1px;
            width: 50px;
            background-color: var(--accent-color);
            margin: 20px auto;
            transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body:hover .line {
            width: 150px;
            background-color: #888;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.4; letter-spacing: 0.3em; filter: blur(1px); }
            50% { opacity: 0.9; letter-spacing: 0.35em; filter: blur(0px); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 1rem; letter-spacing: 0.2em; }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Aut viam inveniam aut faciam</h1>
        <div class="line"></div>
    </div>
</body>
</html>
