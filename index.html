<!DOCTYPE html>
<html lang="la">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.P.</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='black'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' fill='white' font-family='monospace' font-size='50' font-weight='bold'>JP</text></svg>">

    <style>
        :root {
            --bg-color: #080808; 
            --text-color: #e0e0e0;
            --accent-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            cursor: default;
        }

        .content {
            text-align: center;
            padding: 20px;
            animation: fadeInOnce 1.5s ease-out forwards;
        }

        h1 {
            /* Un poco más pequeño para mayor elegancia */
            font-size: 1.25rem; 
            font-weight: 100;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            margin: 0;
            opacity: 1;
            user-select: none;
        }

        .line {
            height: 1px;
            width: 80px; 
            background-color: var(--accent-color);
            margin: 25px auto 0 auto;
        }

        @keyframes fadeInOnce {
            0% { opacity: 0; transform: translateY(5px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Responsive para móviles */
        @media (max-width: 600px) {
            h1 { 
                font-size: 0.9rem; 
                letter-spacing: 0.25em; 
            }
            .line {
                width: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Aut viam inveniam aut faciam</h1>
        <div class="line"></div>
    </div>
</body>
</html>
